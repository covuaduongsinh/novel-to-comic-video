  <!-- Nhân vật truyện tranh đơn giản hoá -->
  <circle cx="11.5" cy="14" r="3" fill="#fd79a8" />
  <circle cx="20.5" cy="14" r="3" fill="#00cec9" />

  <!-- Biểu tượng phát video -->
